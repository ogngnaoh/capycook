# CI (end-to-end build task 1.10): Go vet+test, web test+build, docker build,
# and a full-history repository-integrity guard over immutable event targets.
name: CI

on:
  push:
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod # Go 1.26.x
      - run: go vet ./...
      - run: go test ./...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build .

  guard:
    name: Frozen repository integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # github.sha is the integrity target for every event that reaches this
      # job: the pushed commit on a branch, and the PEELED commit on an
      # annotated-tag push. The frozen-history checks are pin-based, so that
      # commit is all they need — and unlike the push event payload, it does
      # not depend on refs/tags/* surviving actions/checkout, which rewrites
      # annotated tags into lightweight ones before this step runs.
      - name: Validate frozen repository history at the checked-out commit
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: node web/tools/repository-integrity-ci.mjs
