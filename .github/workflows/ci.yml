# CI (end-to-end build task 1.10): Go vet+test, web test+build, docker build,
# and a guard that fails any push/PR touching the frozen docs/PREREGISTRATION.md.
name: CI

on:
  push:
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod # Go 1.26.x
      - run: go vet ./...
      - run: go test ./...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build .

  guard:
    name: PREREGISTRATION frozen guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail if docs/PREREGISTRATION.md changed vs origin/master
        run: |
          git fetch origin master
          if [ -n "$(git diff origin/master...HEAD -- docs/PREREGISTRATION.md)" ]; then
            echo "::error file=docs/PREREGISTRATION.md::PREREGISTRATION.md is frozen (body and §9 log); this branch modifies it." >&2
            git diff --stat origin/master...HEAD -- docs/PREREGISTRATION.md >&2
            exit 1
          fi
          echo "docs/PREREGISTRATION.md unchanged vs origin/master."
